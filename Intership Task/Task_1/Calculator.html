<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body>
    <div class="box">
        <input type="number" placeholder="0">
        <center>
        <div class="number">
            <button>&nbsp;7</button>
            <button>&nbsp;8</button>
            <button>&nbsp;9</button>
            <button>&nbsp;+</button>
        </div>
        <div class="number">
            <button>&nbsp;4</button>
            <button>&nbsp;5</button>
            <button>&nbsp;6</button>
            <button>&nbsp;-</button>
        </div>
        <div class="number">
            <button>&nbsp;3</button>
            <button>&nbsp;2</button>
            <button>&nbsp;1</button>
            <button>&nbsp;=</button>
        </div>
        </center>
    </div>
</body>
</html>
